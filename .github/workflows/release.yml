name: Release

# Triggered when a version tag is pushed (e.g. v1.0.0, v1.2.3-rc1).
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.artifact_name }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: pmas-linux-x64
            artifact_path: dist/pmas-linux-x64
            extra_flags: --strip

          - os: windows-latest
            artifact_name: pmas-windows-x64.exe
            artifact_path: dist/pmas-windows-x64.exe
            extra_flags: ""

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies and PyInstaller
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      - name: Build standalone executable (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          pyinstaller \
            --onefile \
            --strip \
            --name pmas-linux-x64 \
            --add-data "frontend:frontend" \
            --hidden-import uvicorn.logging \
            --hidden-import uvicorn.loops \
            --hidden-import uvicorn.loops.auto \
            --hidden-import uvicorn.protocols \
            --hidden-import uvicorn.protocols.http \
            --hidden-import uvicorn.protocols.http.auto \
            --hidden-import uvicorn.protocols.websockets \
            --hidden-import uvicorn.protocols.websockets.auto \
            --hidden-import uvicorn.lifespan \
            --hidden-import uvicorn.lifespan.on \
            --hidden-import fastapi \
            --hidden-import sqlalchemy.dialects.sqlite \
            --hidden-import multipart \
            --hidden-import anyio \
            --hidden-import h11 \
            --collect-all openpyxl \
            run.py

      - name: Build standalone executable (Windows)
        if: matrix.os == 'windows-latest'
        run: |
          pyinstaller `
            --onefile `
            --name pmas-windows-x64 `
            --icon assets\icon.ico `
            --add-data "frontend;frontend" `
            --hidden-import uvicorn.logging `
            --hidden-import uvicorn.loops `
            --hidden-import uvicorn.loops.auto `
            --hidden-import uvicorn.protocols `
            --hidden-import uvicorn.protocols.http `
            --hidden-import uvicorn.protocols.http.auto `
            --hidden-import uvicorn.protocols.websockets `
            --hidden-import uvicorn.protocols.websockets.auto `
            --hidden-import uvicorn.lifespan `
            --hidden-import uvicorn.lifespan.on `
            --hidden-import fastapi `
            --hidden-import sqlalchemy.dialects.sqlite `
            --hidden-import multipart `
            --hidden-import anyio `
            --hidden-import h11 `
            --collect-all openpyxl `
            run.py

      - name: Upload executable to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_path }}
