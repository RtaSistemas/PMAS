<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMAS — Dashboard de Timesheet</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ------------------------------------------------------------------ */
    /* Header                                                               */
    /* ------------------------------------------------------------------ */
    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0.75rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.1rem; font-weight: 700; letter-spacing: 0.01em; }
    header h1 .header-sub { font-weight: 400; color: #94a3b8; font-size: 0.95rem; }
    header span.badge {
      background: #3b82f6; color: #fff;
      font-size: 0.65rem; font-weight: 700;
      padding: 0.15rem 0.5rem; border-radius: 9999px;
      text-transform: uppercase; letter-spacing: 0.05em;
    }

    /* ------------------------------------------------------------------ */
    /* Tab navigation                                                       */
    /* ------------------------------------------------------------------ */
    .app-tabs {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 0 2rem;
      display: flex;
      gap: 0;
    }
    .tab-btn {
      background: transparent;
      border: none;
      border-bottom: 2px solid transparent;
      color: #64748b;
      font-size: 0.875rem;
      font-weight: 500;
      padding: 0.75rem 1.25rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s;
      white-space: nowrap;
    }
    .tab-btn:hover { color: #cbd5e1; }
    .tab-btn.active { color: #e2e8f0; border-bottom-color: #3b82f6; }

    /* ------------------------------------------------------------------ */
    /* Layout                                                               */
    /* ------------------------------------------------------------------ */
    main {
      flex: 1;
      padding: 2rem;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .tab-section { display: flex; flex-direction: column; gap: 1.5rem; }
    .tab-section[hidden] { display: none; }

    /* ------------------------------------------------------------------ */
    /* Cards                                                                */
    /* ------------------------------------------------------------------ */
    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
    }
    .card > h2, .card-title {
      font-size: 0.8rem; font-weight: 600; color: #64748b;
      margin-bottom: 1rem; text-transform: uppercase; letter-spacing: 0.07em;
    }
    .section-header {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 1rem;
    }
    .section-header h2 { margin-bottom: 0; }

    /* ------------------------------------------------------------------ */
    /* Upload zone                                                          */
    /* ------------------------------------------------------------------ */
    .upload-zone {
      border: 2px dashed #475569; border-radius: 0.5rem; padding: 2rem;
      cursor: pointer; transition: border-color 0.2s, background 0.2s;
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; gap: 0.5rem; text-align: center; min-height: 130px;
    }
    .upload-zone:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone .upload-icon { font-size: 2.5rem; line-height: 1; }
    .upload-zone strong { font-size: 0.925rem; color: #e2e8f0; }
    .upload-zone p { color: #64748b; font-size: 0.8rem; }

    /* ------------------------------------------------------------------ */
    /* Notification                                                         */
    /* ------------------------------------------------------------------ */
    #notification {
      padding: 0.75rem 1rem; border-radius: 0.4rem;
      font-size: 0.875rem; display: none; margin-top: 0.75rem;
    }
    #notification.success { background: rgba(34,197,94,0.15);  border: 1px solid #16a34a; color: #4ade80; }
    #notification.error   { background: rgba(239,68,68,0.15);  border: 1px solid #dc2626; color: #f87171; }
    #notification.info    { background: rgba(59,130,246,0.15); border: 1px solid #2563eb; color: #93c5fd; }

    /* ------------------------------------------------------------------ */
    /* Filter grid                                                          */
    /* ------------------------------------------------------------------ */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem; align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }
    .btn-group { flex-direction: row; gap: 0.5rem; align-items: flex-end; }

    /* ------------------------------------------------------------------ */
    /* Buttons                                                              */
    /* ------------------------------------------------------------------ */
    .btn {
      height: 2.4rem; border-radius: 0.4rem; font-size: 0.875rem;
      padding: 0 1.25rem; cursor: pointer; font-weight: 600;
      white-space: nowrap; transition: background 0.15s, border-color 0.15s;
      border: 1px solid transparent; display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-primary  { background: #3b82f6; border-color: #3b82f6; color: #fff; }
    .btn-primary:hover:not(:disabled)  { background: #2563eb; border-color: #2563eb; }
    .btn-secondary { background: transparent; border-color: #475569; color: #94a3b8; }
    .btn-secondary:hover { border-color: #94a3b8; color: #e2e8f0; }
    .btn-danger   { background: transparent; border-color: #dc2626; color: #f87171; }
    .btn-danger:hover  { background: rgba(239,68,68,0.1); }
    .btn-sm { height: 2rem; font-size: 0.8rem; padding: 0 0.75rem; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; }

    /* ------------------------------------------------------------------ */
    /* Multi-select                                                         */
    /* ------------------------------------------------------------------ */
    .ms-root { position: relative; width: 100%; }
    .ms-toggle {
      width: 100%; height: 2.4rem; border-radius: 0.4rem;
      border: 1px solid #475569; background: #0f172a; color: #4b5563;
      font-size: 0.8125rem; padding: 0 0.75rem; cursor: pointer;
      display: flex; align-items: center; justify-content: space-between; gap: 0.4rem;
      transition: border-color 0.15s;
    }
    .ms-toggle:hover { border-color: #64748b; }
    .ms-toggle.has-value { color: #e2e8f0; }
    .ms-toggle .ms-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ms-toggle .ms-arrow { flex-shrink: 0; font-size: 0.7rem; color: #64748b; }
    .ms-dropdown {
      position: absolute; top: calc(100% + 4px); left: 0; right: 0; z-index: 200;
      background: #1e293b; border: 1px solid #475569; border-radius: 0.4rem;
      max-height: 260px; overflow-y: auto; box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }
    .ms-option {
      display: flex; align-items: center; gap: 0.5rem; padding: 0.45rem 0.75rem;
      cursor: pointer; font-size: 0.8rem; color: #e2e8f0; user-select: none;
    }
    .ms-option:hover { background: rgba(59,130,246,0.15); }
    .ms-option.ms-all { font-weight: 600; color: #94a3b8; border-bottom: 1px solid #334155; font-size: 0.75rem; }
    .ms-option input[type="checkbox"] { accent-color: #3b82f6; flex-shrink: 0; width: 13px; height: 13px; cursor: pointer; }
    .ms-empty { padding: 0.75rem; text-align: center; color: #64748b; font-size: 0.8rem; }

    /* ------------------------------------------------------------------ */
    /* Charts container + panel                                             */
    /* ------------------------------------------------------------------ */
    #chartsContainer { display: flex; flex-direction: column; gap: 1.5rem; }
    .chart-panel { padding: 1.25rem 1.5rem 1.5rem; }
    .panel-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 1rem; gap: 1rem; }
    .panel-title { font-size: 0.8rem; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.07em; flex: 1; }
    .panel-close {
      flex-shrink: 0; background: transparent; border: 1px solid #334155;
      color: #64748b; font-size: 1rem; line-height: 1; padding: 0.2rem 0.55rem;
      border-radius: 0.35rem; cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .panel-close:hover { color: #f87171; border-color: #f87171; background: rgba(239,68,68,0.08); }
    .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.75rem; margin-bottom: 1.25rem; }
    .stat-card { background: #0f172a; border: 1px solid #334155; border-radius: 0.5rem; padding: 0.75rem 1rem; text-align: center; }
    .stat-card .val { font-size: 1.4rem; font-weight: 700; }
    .stat-card .lbl { font-size: 0.68rem; color: #64748b; text-transform: uppercase; margin-top: 0.15rem; letter-spacing: 0.04em; }
    .stat-card.blue .val   { color: #3b82f6; }
    .stat-card.amber .val  { color: #f59e0b; }
    .stat-card.violet .val { color: #8b5cf6; }
    .stat-card.green .val  { color: #22c55e; }
    .stat-card.neutral .val{ color: #e2e8f0; }
    .stat-card.red .val    { color: #f87171; }

    /* ------------------------------------------------------------------ */
    /* Management tables                                                    */
    /* ------------------------------------------------------------------ */
    .data-table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    .data-table th {
      text-align: left; padding: 0.6rem 0.75rem; font-size: 0.72rem; font-weight: 600;
      color: #64748b; text-transform: uppercase; letter-spacing: 0.05em;
      border-bottom: 1px solid #334155;
    }
    .data-table td { padding: 0.65rem 0.75rem; border-bottom: 1px solid #1e3a5f22; color: #cbd5e1; vertical-align: middle; }
    .data-table tr:last-child td { border-bottom: none; }
    .data-table tr:hover td { background: rgba(59,130,246,0.04); }
    .data-table .actions { display: flex; gap: 0.4rem; }

    .badge-status {
      display: inline-block; padding: 0.15rem 0.55rem; border-radius: 9999px;
      font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge-status.ativo     { background: rgba(34,197,94,0.15);  color: #4ade80; }
    .badge-status.encerrado { background: rgba(100,116,139,0.2);  color: #94a3b8; }
    .badge-status.suspenso  { background: rgba(245,158,11,0.15);  color: #fbbf24; }
    .badge-status.quarantine{ background: rgba(245,158,11,0.15);  color: #fbbf24; }

    /* ------------------------------------------------------------------ */
    /* Form inputs                                                          */
    /* ------------------------------------------------------------------ */
    .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
    .form-grid.cols-1 { grid-template-columns: 1fr; }
    .form-group { display: flex; flex-direction: column; gap: 0.35rem; }
    .form-group label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }
    .form-group.full { grid-column: 1 / -1; }
    input[type="text"], input[type="number"], input[type="date"], select.form-select {
      height: 2.4rem; border-radius: 0.4rem; border: 1px solid #475569;
      background: #0f172a; color: #e2e8f0; font-size: 0.875rem;
      padding: 0 0.75rem; width: 100%;
      transition: border-color 0.15s;
    }
    input:focus, select.form-select:focus { outline: none; border-color: #3b82f6; }
    input::placeholder { color: #4b5563; }

    /* ------------------------------------------------------------------ */
    /* Modal                                                                */
    /* ------------------------------------------------------------------ */
    .modal-backdrop {
      position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 400;
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    .modal-backdrop[hidden] { display: none; }
    .modal-box {
      background: #1e293b; border: 1px solid #334155; border-radius: 0.75rem;
      padding: 1.5rem; width: 100%; max-width: 540px;
      display: flex; flex-direction: column; gap: 1.25rem;
    }
    .modal-header { display: flex; justify-content: space-between; align-items: center; }
    .modal-header h3 { font-size: 1rem; font-weight: 600; color: #f1f5f9; }
    .modal-close {
      background: transparent; border: none; color: #64748b;
      font-size: 1.25rem; cursor: pointer; line-height: 1; padding: 0.2rem;
    }
    .modal-close:hover { color: #e2e8f0; }
    .modal-footer { display: flex; justify-content: flex-end; gap: 0.75rem; }
    .error-msg { font-size: 0.8rem; color: #f87171; min-height: 1.2em; }
  </style>
</head>
<body>

<header>
  <h1>PMAS <span class="header-sub">- Project Management Assistant System</span></h1>
  <span class="badge">Timesheet</span>
</header>

<nav class="app-tabs">
  <button class="tab-btn active" data-tab="dashboard">Dashboard</button>
  <button class="tab-btn" data-tab="cycles">Ciclos</button>
  <button class="tab-btn" data-tab="projects">Projetos</button>
</nav>

<main>

  <!-- ================================================================== -->
  <!-- TAB: Dashboard                                                       -->
  <!-- ================================================================== -->
  <section id="tab-dashboard" class="tab-section">

    <div class="card">
      <h2>Importar Timesheet</h2>
      <label class="upload-zone" id="uploadZone">
        <input type="file" id="csvInput" accept=".csv,.xlsx,.xls" />
        <div class="upload-icon">📂</div>
        <strong>Clique para selecionar CSV ou XLSX</strong>
        <p>ou arraste e solte aqui</p>
      </label>
      <div id="notification"></div>
    </div>

    <div class="card">
      <h2>Filtros</h2>
      <div class="filter-grid">
        <div class="field"><label>Ciclo</label><div id="cycleMs"></div></div>
        <div class="field"><label>PEP (Código)</label><div id="pepMs"></div></div>
        <div class="field"><label>PEP (Descrição)</label><div id="pepDescMs"></div></div>
        <div class="field"><label>Colaborador</label><div id="collaboratorMs"></div></div>
        <div class="field btn-group">
          <button id="loadBtn" class="btn btn-primary" disabled>Carregar</button>
          <button id="clearBtn" class="btn btn-secondary">Limpar</button>
        </div>
      </div>
    </div>

    <div id="chartsContainer"></div>

  </section>

  <!-- ================================================================== -->
  <!-- TAB: Ciclos                                                          -->
  <!-- ================================================================== -->
  <section id="tab-cycles" class="tab-section" hidden>
    <div class="card">
      <div class="section-header">
        <h2 class="card-title">Ciclos cadastrados</h2>
        <button class="btn btn-primary btn-sm" id="newCycleBtn">+ Novo ciclo</button>
      </div>
      <table class="data-table" id="cyclesTable">
        <thead>
          <tr>
            <th>Nome</th>
            <th>Início</th>
            <th>Fim</th>
            <th>Tipo</th>
            <th style="text-align:right">Registros</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="cyclesBody"><tr><td colspan="6" style="text-align:center;color:#475569;padding:2rem">Carregando…</td></tr></tbody>
      </table>
    </div>
  </section>

  <!-- ================================================================== -->
  <!-- TAB: Projetos                                                        -->
  <!-- ================================================================== -->
  <section id="tab-projects" class="tab-section" hidden>
    <div class="card">
      <div class="section-header">
        <h2 class="card-title">Projetos / PEPs</h2>
        <button class="btn btn-primary btn-sm" id="newProjectBtn">+ Novo projeto</button>
      </div>
      <table class="data-table" id="projectsTable">
        <thead>
          <tr>
            <th>Código PEP</th>
            <th>Nome do Projeto</th>
            <th>Cliente</th>
            <th>Gerente</th>
            <th style="text-align:right">Budget (h)</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="projectsBody"><tr><td colspan="7" style="text-align:center;color:#475569;padding:2rem">Carregando…</td></tr></tbody>
      </table>
    </div>
  </section>

</main>

<!-- ================================================================== -->
<!-- Modal: Ciclo                                                         -->
<!-- ================================================================== -->
<div class="modal-backdrop" id="cycleModal" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="cycleModalTitle">Novo Ciclo</h3>
      <button class="modal-close" id="cycleModalClose">×</button>
    </div>
    <div class="form-grid cols-1">
      <div class="form-group">
        <label for="cycleNameInput">Nome *</label>
        <input type="text" id="cycleNameInput" placeholder="Ex: Janeiro/2026" />
      </div>
      <div class="form-grid">
        <div class="form-group">
          <label for="cycleStartInput">Data início *</label>
          <input type="date" id="cycleStartInput" />
        </div>
        <div class="form-group">
          <label for="cycleEndInput">Data fim *</label>
          <input type="date" id="cycleEndInput" />
        </div>
      </div>
    </div>
    <div class="error-msg" id="cycleError"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="cycleCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="cycleSaveBtn">Salvar</button>
    </div>
  </div>
</div>

<!-- ================================================================== -->
<!-- Modal: Projeto                                                       -->
<!-- ================================================================== -->
<div class="modal-backdrop" id="projectModal" hidden>
  <div class="modal-box">
    <div class="modal-header">
      <h3 id="projectModalTitle">Novo Projeto</h3>
      <button class="modal-close" id="projectModalClose">×</button>
    </div>
    <div class="form-grid">
      <div class="form-group">
        <label for="projectPepInput">Código PEP *</label>
        <input type="text" id="projectPepInput" placeholder="Ex: 60OP-03333" />
      </div>
      <div class="form-group">
        <label for="projectStatusInput">Status</label>
        <select class="form-select" id="projectStatusInput">
          <option value="ativo">Ativo</option>
          <option value="suspenso">Suspenso</option>
          <option value="encerrado">Encerrado</option>
        </select>
      </div>
      <div class="form-group full">
        <label for="projectNameInput">Nome do Projeto</label>
        <input type="text" id="projectNameInput" placeholder="Nome descritivo" />
      </div>
      <div class="form-group">
        <label for="projectClientInput">Cliente</label>
        <input type="text" id="projectClientInput" placeholder="Nome do cliente" />
      </div>
      <div class="form-group">
        <label for="projectManagerInput">Gerente</label>
        <input type="text" id="projectManagerInput" placeholder="Nome do gerente" />
      </div>
      <div class="form-group">
        <label for="projectBudgetInput">Budget de horas</label>
        <input type="number" id="projectBudgetInput" placeholder="Ex: 160" min="0" step="0.5" />
      </div>
    </div>
    <div class="error-msg" id="projectError"></div>
    <div class="modal-footer">
      <button class="btn btn-secondary" id="projectCancelBtn">Cancelar</button>
      <button class="btn btn-primary" id="projectSaveBtn">Salvar</button>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
