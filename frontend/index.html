<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PMAS — Dashboard de Timesheet</title>
  <script src="https://cdn.jsdelivr.net/npm/echarts@5/dist/echarts.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    header h1 { font-size: 1.25rem; font-weight: 600; letter-spacing: 0.02em; }
    header span.badge {
      background: #3b82f6;
      color: #fff;
      font-size: 0.65rem;
      font-weight: 700;
      padding: 0.15rem 0.5rem;
      border-radius: 9999px;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    main {
      flex: 1;
      padding: 2rem;
      max-width: 1400px;
      width: 100%;
      margin: 0 auto;
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 0.75rem;
      padding: 1.5rem;
    }
    .card > h2 {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      margin-bottom: 1rem;
      text-transform: uppercase;
      letter-spacing: 0.07em;
    }

    /* ------------------------------------------------------------------ */
    /* Upload zone                                                          */
    /* ------------------------------------------------------------------ */
    .upload-zone {
      border: 2px dashed #475569;
      border-radius: 0.5rem;
      padding: 2rem;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      text-align: center;
      min-height: 130px;
    }
    .upload-zone:hover { border-color: #3b82f6; background: rgba(59,130,246,0.05); }
    .upload-zone input[type="file"] { display: none; }
    .upload-zone .upload-icon { font-size: 2.5rem; line-height: 1; }
    .upload-zone strong { font-size: 0.925rem; color: #e2e8f0; }
    .upload-zone p { color: #64748b; font-size: 0.8rem; }

    /* ------------------------------------------------------------------ */
    /* Notification                                                         */
    /* ------------------------------------------------------------------ */
    #notification {
      padding: 0.75rem 1rem;
      border-radius: 0.4rem;
      font-size: 0.875rem;
      display: none;
      margin-top: 0.75rem;
    }
    #notification.success { background: rgba(34,197,94,0.15);  border: 1px solid #16a34a; color: #4ade80; }
    #notification.error   { background: rgba(239,68,68,0.15);  border: 1px solid #dc2626; color: #f87171; }
    #notification.info    { background: rgba(59,130,246,0.15); border: 1px solid #2563eb; color: #93c5fd; }

    /* ------------------------------------------------------------------ */
    /* Filter grid                                                          */
    /* ------------------------------------------------------------------ */
    .filter-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 1rem;
      align-items: end;
    }
    .field { display: flex; flex-direction: column; gap: 0.35rem; }
    .field label { font-size: 0.75rem; color: #94a3b8; font-weight: 500; }

    .btn-group { flex-direction: row; gap: 0.5rem; align-items: flex-end; }

    button.primary, button.secondary {
      height: 2.4rem;
      border-radius: 0.4rem;
      font-size: 0.875rem;
      padding: 0 1.25rem;
      cursor: pointer;
      font-weight: 600;
      white-space: nowrap;
      transition: background 0.15s, border-color 0.15s;
      border: 1px solid transparent;
    }
    button.primary {
      background: #3b82f6;
      border-color: #3b82f6;
      color: #fff;
    }
    button.primary:hover:not(:disabled) { background: #2563eb; border-color: #2563eb; }
    button.primary:disabled { opacity: 0.4; cursor: not-allowed; }
    button.secondary {
      background: transparent;
      border-color: #475569;
      color: #94a3b8;
    }
    button.secondary:hover { border-color: #94a3b8; color: #e2e8f0; }

    /* ------------------------------------------------------------------ */
    /* Multi-select component                                               */
    /* ------------------------------------------------------------------ */
    .ms-root { position: relative; width: 100%; }

    .ms-toggle {
      width: 100%;
      height: 2.4rem;
      border-radius: 0.4rem;
      border: 1px solid #475569;
      background: #0f172a;
      color: #4b5563;
      font-size: 0.8125rem;
      padding: 0 0.75rem;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 0.4rem;
      text-align: left;
      transition: border-color 0.15s;
    }
    .ms-toggle:hover { border-color: #64748b; }
    .ms-toggle.has-value { color: #e2e8f0; }
    .ms-toggle .ms-label { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; flex: 1; }
    .ms-toggle .ms-arrow { flex-shrink: 0; font-size: 0.7rem; color: #64748b; }

    .ms-dropdown {
      position: absolute;
      top: calc(100% + 4px);
      left: 0;
      right: 0;
      z-index: 200;
      background: #1e293b;
      border: 1px solid #475569;
      border-radius: 0.4rem;
      max-height: 260px;
      overflow-y: auto;
      box-shadow: 0 8px 24px rgba(0,0,0,0.6);
    }

    .ms-option {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.45rem 0.75rem;
      cursor: pointer;
      font-size: 0.8rem;
      color: #e2e8f0;
      user-select: none;
      line-height: 1.4;
    }
    .ms-option:hover { background: rgba(59,130,246,0.15); }
    .ms-option.ms-all {
      font-weight: 600;
      color: #94a3b8;
      border-bottom: 1px solid #334155;
      font-size: 0.75rem;
    }
    .ms-option input[type="checkbox"] {
      accent-color: #3b82f6;
      flex-shrink: 0;
      width: 13px;
      height: 13px;
      cursor: pointer;
    }
    .ms-empty {
      padding: 0.75rem;
      text-align: center;
      color: #64748b;
      font-size: 0.8rem;
    }

    /* ------------------------------------------------------------------ */
    /* Charts container + panel                                             */
    /* ------------------------------------------------------------------ */
    #chartsContainer { display: flex; flex-direction: column; gap: 1.5rem; }

    .chart-panel { padding: 1.25rem 1.5rem 1.5rem; }

    .panel-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .panel-title {
      font-size: 0.8rem;
      font-weight: 600;
      color: #64748b;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      flex: 1;
    }
    .panel-close {
      flex-shrink: 0;
      background: transparent;
      border: 1px solid #334155;
      color: #64748b;
      font-size: 1rem;
      line-height: 1;
      padding: 0.2rem 0.55rem;
      border-radius: 0.35rem;
      cursor: pointer;
      transition: color 0.15s, border-color 0.15s, background 0.15s;
    }
    .panel-close:hover { color: #f87171; border-color: #f87171; background: rgba(239,68,68,0.08); }

    /* Stats row inside each panel */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.75rem;
      margin-bottom: 1.25rem;
    }
    .stat-card {
      background: #0f172a;
      border: 1px solid #334155;
      border-radius: 0.5rem;
      padding: 0.75rem 1rem;
      text-align: center;
    }
    .stat-card .val { font-size: 1.4rem; font-weight: 700; }
    .stat-card .lbl { font-size: 0.68rem; color: #64748b; text-transform: uppercase; margin-top: 0.15rem; letter-spacing: 0.04em; }
    .stat-card.blue .val   { color: #3b82f6; }
    .stat-card.amber .val  { color: #f59e0b; }
    .stat-card.violet .val { color: #8b5cf6; }
    .stat-card.green .val  { color: #22c55e; }
    .stat-card.neutral .val{ color: #e2e8f0; }
  </style>
</head>
<body>

<header>
  <h1>PMAS</h1>
  <span class="badge">Timesheet</span>
</header>

<main>

  <!-- Upload -->
  <div class="card">
    <h2>Importar Timesheet</h2>
    <label class="upload-zone" id="uploadZone">
      <input type="file" id="csvInput" accept=".csv,.xlsx,.xls" />
      <div class="upload-icon">📂</div>
      <strong>Clique para selecionar CSV ou XLSX</strong>
      <p>ou arraste e solte aqui</p>
    </label>
    <div id="notification"></div>
  </div>

  <!-- Filters -->
  <div class="card">
    <h2>Filtros</h2>
    <div class="filter-grid">
      <div class="field">
        <label>Ciclo *</label>
        <div id="cycleMs"></div>
      </div>
      <div class="field">
        <label>PEP (Código)</label>
        <div id="pepMs"></div>
      </div>
      <div class="field">
        <label>PEP (Descrição)</label>
        <div id="pepDescMs"></div>
      </div>
      <div class="field">
        <label>Colaborador</label>
        <div id="collaboratorMs"></div>
      </div>
      <div class="field btn-group">
        <button id="loadBtn" class="primary" disabled>Carregar</button>
        <button id="clearBtn" class="secondary">Limpar</button>
      </div>
    </div>
  </div>

  <!-- Charts are appended here dynamically -->
  <div id="chartsContainer"></div>

</main>

<script src="app.js"></script>
</body>
</html>
